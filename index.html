<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Martin Trading Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --green: #238636; --light-green: #7ee787; --red: #f85149; --text: #e6edf3; --dim: #8b949e; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 1.5rem; border-radius: 24px; border: 1px solid #30363d; text-align: center; width: 90%; max-width: 360px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; }
        
        /* UI Components */
        .gauge-box { position: relative; width: 200px; height: 100px; margin: 15px auto; overflow: hidden; }
        .arc { width: 200px; height: 200px; border-radius: 50%; border: 14px solid #30363d; border-bottom-color: var(--green); transform: rotate(45deg); }
        .needle { position: absolute; bottom: 0; left: 50%; width: 3px; height: 80px; background: var(--red); transform-origin: bottom center; transform: rotate(-90deg); transition: transform 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67); border-radius: 2px; }
        .status { font-size: 1.8rem; font-weight: 800; margin: 5px 0; }
        .badge { font-family: monospace; background: #21262d; padding: 4px 10px; border-radius: 6px; color: var(--light-green); border: 1px solid #30363d; font-size: 0.8rem; }
        
        /* Performance & Data Rows */
        .pnl-container { display: flex; justify-content: space-between; margin: 15px 0; background: #0d1117; padding: 10px; border-radius: 8px; border: 1px solid #30363d; }
        .pnl-box { text-align: center; width: 48%; }
        .pnl-title { font-size: 0.6rem; color: var(--dim); text-transform: uppercase; margin-bottom: 2px; }
        .pnl-value { font-family: monospace; font-size: 0.95rem; font-weight: bold; }
        .data-row { display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.75rem; color: var(--dim); }

        /* Logging & Inputs */
        .trade-section { margin-top: 15px; padding: 12px; background: #1c2128; border-radius: 12px; border: 1px solid #30363d; }
        select, input { width: 100%; padding: 8px; margin-bottom: 8px; background: var(--bg); border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; font-size: 0.9rem; }
